<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhoneBook — Contact Manager</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Toast Notification -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">☎</span>
        <span class="logo-text">PhoneBook</span>
      </div>
      <div class="header-meta">
        <span id="contact-count" class="contact-count">— contacts</span>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- Left Panel: Form -->
    <aside class="panel panel-form">
      <div class="panel-header">
        <h2 id="form-title">Add Contact</h2>
        <div class="panel-line"></div>
      </div>

      <form id="contact-form" novalidate>
        <input type="hidden" id="contact-id" />

        <div class="field-group">
          <label for="contact-name">Full Name</label>
          <input type="text" id="contact-name" placeholder="e.g. Ada Lovelace" autocomplete="off" />
          <span class="field-error" id="error-name"></span>
        </div>

        <div class="field-group">
          <label for="contact-phone">Phone Number</label>
          <input type="tel" id="contact-phone" placeholder="e.g. +91 9876543210" autocomplete="off" />
          <span class="field-error" id="error-phone"></span>
        </div>

        <div class="field-group">
          <label for="contact-email">Email Address</label>
          <input type="email" id="contact-email" placeholder="e.g. ada@example.com" autocomplete="off" />
          <span class="field-error" id="error-email"></span>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn" class="btn btn-primary">
            <span class="btn-icon">+</span>
            <span id="submit-label">Add Contact</span>
          </button>
          <button type="button" id="cancel-btn" class="btn btn-ghost" style="display:none;">Cancel</button>
        </div>
      </form>

      <!-- API Status -->
      <div class="api-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-label">Connecting…</span>
      </div>
    </aside>

    <!-- Right Panel: Contacts List -->
    <section class="panel panel-list">
      <div class="panel-header">
        <h2>Contacts</h2>
        <div class="panel-line"></div>
      </div>

      <!-- Search & Filter Bar -->
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="search" id="search-input" placeholder="Search by name…" />
        </div>
        <div class="filter-wrap">
          <label for="alpha-filter">Filter</label>
          <select id="alpha-filter">
            <option value="">All</option>
            <option value="A-F">A – F</option>
            <option value="G-L">G – L</option>
            <option value="M-R">M – R</option>
            <option value="S-Z">S – Z</option>
          </select>
        </div>
      </div>

      <!-- Contacts Container -->
      <div id="contacts-container">
        <div class="loader" id="loader">
          <div class="spinner"></div>
          <p>Fetching contacts…</p>
        </div>
        <div id="contacts-list" class="contacts-list"></div>
        <div id="empty-state" class="empty-state" style="display:none;">
          <span class="empty-icon">📭</span>
          <p>No contacts found.</p>
          <small>Try a different search or add a new contact.</small>
        </div>
      </div>
    </section>

  </main>

  <!-- Delete Confirmation Modal -->
   <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>Delete Contact?</h3>
      <p id="modal-msg">This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="modal-confirm" class="btn btn-danger">Delete</button>
        <button id="modal-cancel" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
